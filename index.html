<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>학생 질문 게시판</title>
    <style>
        /* 전체 화면 기본 설정 */
        body { 
            font-family: 'Apple SD Gothic Neo', "Malgun Gothic", "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f4f7f6; 
            height: 100vh; /* 화면 높이를 정확히 100%로 맞춤 */
            display: flex; 
            flex-direction: column; 
            overflow: hidden; /* 겉 화면 이중 스크롤 방지 */
        }
        
        /* 상단 헤더(안내문) 디자인 - 깔끔하고 신뢰감 있게 */
        .header {
            background-color: #ffffff;
            text-align: center;
            padding: 15px 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            z-index: 10;
            flex-shrink: 0; /* 화면이 좁아져도 헤더 크기는 유지 */
        }
        .header h1 { 
            color: #2c3e50; 
            font-size: 1.4em; 
            margin: 0 0 5px 0;
            letter-spacing: -0.5px;
        }
        .header p {
            color: #7f8c8d;
            margin: 0;
            font-size: 0.9em;
        }

        /* 패들렛이 들어갈 공간 */
        .padlet-container {
            flex-grow: 1; /* 상단 헤더를 제외한 나머지 화면을 모두 차지 */
            width: 100%;
            background-color: #F4F4F4;
        }

        /* 패들렛 삽입 코드 강제 크기 보정 (빈틈없이 화면에 꽉 차게) */
        .padlet-container .padlet-embed {
            height: 100% !important;
            display: flex !important;
            flex-direction: column !important;
            border: none !important; 
        }
        .padlet-container .padlet-embed > p {
            flex-grow: 1 !important;
            display: flex !important;
        }
        .padlet-container iframe {
            height: 100% !important;
            width: 100% !important;
            border: none !important;
        }
    </style>
</head>
<body>

    <div class="header">
    <h1>👨‍🏫 수업 Q&A 게시판</h1>
    <p>질문이 있다면 <strong>+ 버튼</strong>을 눌러주세요! (로그인 시 이름이 자동 입력됩니다)</p>
    
    <p style="font-size: 0.85em; margin-top: 8px; color: #3498db;">
        이름이 안 뜨나요? 
        <a href="https://padlet.com/auth/login" target="_blank" style="color: #3498db; font-weight: bold; text-decoration: underline;">여기서 로그인</a> 
        후 새로고침(F5) 해주세요!
    </p>
</div>
</body>
</html>
